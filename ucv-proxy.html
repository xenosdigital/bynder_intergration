<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UCV Proxy</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #fff; }
    #bynder-compactview { width: 100%; height: 100vh; }
  </style>
</head>
<body>

<div id="bynder-compactview"></div>

<script>
  // This page is intentionally config-free.
  // All configuration (portal URL, asset types, etc.) is posted from the
  // parent plugin UI via postMessage before the UCV script is loaded.

  window.addEventListener("message", function handler(event) {
    var data = event.data;
    if (!data || data.type !== "ucv-init") return;

    // Only initialise once
    window.removeEventListener("message", handler);

    var config = Object.assign({}, data.config, {
      onSuccess: function(assets) {
        // Relay selection back to the plugin UI
        window.parent.postMessage({ type: "ucv-selection", assets: assets }, "*");
      }
    });

    var script = document.createElement("script");
    script.src = "https://d8ejoa1fys2rk.cloudfront.net/bynder-compactview/latest/bynder-compactview.js";
    script.onload = function() {
      if (window.BynderCompactView) {
        window.BynderCompactView.open(config);
      }
    };
    document.body.appendChild(script);
  });
</script>
</body>
</html>
