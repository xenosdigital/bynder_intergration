<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UCV Proxy</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #fff; }
  </style>
</head>
<body>

<!-- UCV script loaded synchronously — no dynamic injection -->
<script src="https://ucv.bynder.com/5.0.5/modules/compactview/bynder-compactview-5-latest.js"></script>
<script>
  // Config is received via postMessage from the plugin UI.
  // Once received, open the UCV immediately.
  var initialised = false;

  window.addEventListener("message", function(event) {
    var data = event.data;
    if (!data || data.type !== "ucv-init") return;
    if (initialised) return;
    initialised = true;

    // Acknowledge so the plugin stops polling
    window.parent.postMessage({ type: "ucv-ready" }, "*");

    var portalUrl  = data.config.portal.url;
    var assetTypes = data.config.assetTypes || ["image"];
    var mode       = data.config.mode || "SingleSelectFile";

    BynderCompactView.open({
      language: "en_US",
      portal: { url: portalUrl },
      assetTypes: assetTypes,
      mode: mode,
      onSuccess: function(assets, additionalInfo) {
        window.parent.postMessage({
          type: "ucv-selection",
          assets: assets,
          additionalInfo: additionalInfo || null
        }, "*");
      }
    });
  });
</script>
</body>
</html>
