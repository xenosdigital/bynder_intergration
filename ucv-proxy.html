<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UCV Proxy</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #fff; }
    #bynder-compactview { width: 100%; height: 100vh; }
  </style>
</head>
<body>

<div id="bynder-compactview"></div>

<script>
  // Listen for ucv-init config from the parent plugin UI
  window.addEventListener("message", function handler(event) {
    var data = event.data;
    if (!data || data.type !== "ucv-init") return;
    window.removeEventListener("message", handler);

    var config = Object.assign({}, data.config, {
      onSuccess: function(assets) {
        window.parent.postMessage({ type: "ucv-selection", assets: assets }, "*");
      }
    });

    var script = document.createElement("script");
    script.src = "https://d8ejoa1fys2rk.cloudfront.net/bynder-compactview/latest/bynder-compactview.js";
    script.onload = function() {
      if (window.BynderCompactView) {
        window.BynderCompactView.open(config);
      }
    };
    document.body.appendChild(script);
  });

  // Signal to the parent that this page is ready to receive config.
  // Use a small poll so it fires even if the parent listener isn't up yet.
  function signalReady() {
    window.parent.postMessage({ type: "ucv-ready" }, "*");
  }

  // Fire immediately, then again after a tick in case of race
  signalReady();
  setTimeout(signalReady, 100);
  setTimeout(signalReady, 500);
</script>
</body>
</html>
